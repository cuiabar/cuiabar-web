        - generic [ref=e91]:
          - paragraph [ref=e92]: "O Villa Cuiabar nasceu em 2017 com um propósito simples: ser um espaço onde boas cervejas e momentos descontraídos se encontrassem. Mas logo percebemos que poderíamos ir além. Em 2018, abraçamos um novo desafio e transformamos o bar em um restaurante e grill, focado em oferecer uma experiência gastronômica completa, com pratos bem servidos e cheios de sabor."
          - paragraph [ref=e93]: "Sempre atentos ao que nossos clientes buscavam, em 2019 tomamos uma decisão ousada: tornar nossos almoços mais acessíveis, sem abrir mão da qualidade. E quando a pandemia chegou, em vez de recuar, enfrentamos o desafio de peito aberto, reinventando nosso atendimento para continuar servindo com excelência."
          - paragraph [ref=e94]: Nosso crescimento seguiu firme. Em 2022, lançamos o Expresso Cuiabar, nossa marmitaria, levando praticidade e o mesmo sabor inconfundível para o dia a dia de ainda mais pessoas. Hoje, seguimos expandindo, inovando e aprimorando cada detalhe para entregar o melhor custo-benefício da região de Campinas.
          - paragraph [ref=e95]: Mas, acima de tudo, o Villa Cuiabar é sobre família. Foi dentro dela que tudo começou, e é por ela que seguimos firmes, superando desafios e construindo nossa história. E são nossos clientes, que confiam e fazem parte dessa jornada, que nos motivam a evoluir a cada dia.
          - paragraph [ref=e96]: "Villa Cuiabar: onde tradição e sabor se encontram para servir bem, sempre."
