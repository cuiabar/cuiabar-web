server {
    listen 80;
    server_name blog.cuiabar.com;

    root /var/www/blog.cuiabar.com/current;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /rss.xml {
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|map|jpg|jpeg|png|webp|avif|svg|ico|woff2)$ {
        expires 30d;
        access_log off;
    }
}
