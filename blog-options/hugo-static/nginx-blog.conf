server {
    listen 80;
    server_name blog.cuiabar.com;

    root /var/www/blog.cuiabar.com/current;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|webp|avif|svg|ico|woff2|xml)$ {
        expires 30d;
        access_log off;
    }
}
