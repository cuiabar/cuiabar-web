server {
    listen 80;
    listen [::]:80;
    server_name blog.cuiabar.com;

    client_max_body_size 30m;

    # Frontend publico do blog (ajuste para o seu host real)
    location / {
        proxy_pass https://cuiabar-blog.pages.dev;
        proxy_http_version 1.1;
        proxy_set_header Host cuiabar-blog.pages.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Editor em blog.cuiabar.com/editor
    location = /editor {
        return 301 /editor/;
    }

    location /editor/ {
        # Remove o prefixo /editor e encaminha para o Directus local
        rewrite ^/editor/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /editor;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
