services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - directus_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  directus:
    image: directus/directus:11.17.0
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - '${DIRECTUS_PORT:-8055}:8055'
    volumes:
      - directus_uploads_data:/directus/uploads
      - directus_extensions_data:/directus/extensions
      - directus_snapshots_data:/directus/snapshots
    environment:
      PUBLIC_URL: ${PUBLIC_URL}
      AUTH_ALLOWED_PUBLIC_URLS: ${AUTH_ALLOWED_PUBLIC_URLS:-}
      AUTH_PROVIDERS: ${AUTH_PROVIDERS:-}
      AUTH_DISABLE_DEFAULT: ${AUTH_DISABLE_DEFAULT:-false}
      AUTH_GOOGLE_DRIVER: ${AUTH_GOOGLE_DRIVER:-}
      AUTH_GOOGLE_MODE: ${AUTH_GOOGLE_MODE:-session}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_GOOGLE_ISSUER_URL: ${AUTH_GOOGLE_ISSUER_URL:-}
      AUTH_GOOGLE_IDENTIFIER_KEY: ${AUTH_GOOGLE_IDENTIFIER_KEY:-email}
      AUTH_GOOGLE_REQUIRE_VERIFIED_EMAIL: ${AUTH_GOOGLE_REQUIRE_VERIFIED_EMAIL:-true}
      AUTH_GOOGLE_ALLOW_PUBLIC_REGISTRATION: ${AUTH_GOOGLE_ALLOW_PUBLIC_REGISTRATION:-false}
      AUTH_GOOGLE_SYNC_USER_INFO: ${AUTH_GOOGLE_SYNC_USER_INFO:-true}
      AUTH_GOOGLE_LABEL: ${AUTH_GOOGLE_LABEL:-Entrar com Google}
      SECRET: ${DIRECTUS_SECRET}
      KEY: ${DIRECTUS_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: 'false'
      CORS_ENABLED: 'true'
      CORS_ORIGIN: ${CORS_ORIGIN}
      WEBSOCKETS_ENABLED: 'true'
      CACHE_ENABLED: 'true'
      CACHE_AUTO_PURGE: 'true'
      CACHE_STORE: redis
      REDIS: redis://cache:6379
      RATE_LIMITER_ENABLED: 'true'
      RATE_LIMITER_POINTS: ${RATE_LIMITER_POINTS}
      RATE_LIMITER_DURATION: ${RATE_LIMITER_DURATION}
      TELEMETRY: 'false'
      EMAIL_FROM: ${EMAIL_FROM}
      PM2_INSTANCES: '1'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:8055/server/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    profiles:
      - remote
    restart: unless-stopped
    depends_on:
      directus:
        condition: service_healthy
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDENTIALS_FILE}:/etc/cloudflared/tunnel-credentials.json:ro

volumes:
  directus_db_data:
  directus_uploads_data:
  directus_extensions_data:
  directus_snapshots_data:
